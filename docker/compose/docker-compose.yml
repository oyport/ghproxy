version: '3.9'

services:
  ghproxy:
    image: 'wjqserver/ghproxy:latest'
    container_name: ghproxy
    restart: always
    
    # 端口映射
    ports:
      - '7210:8080'
    
    # 数据卷挂载
    volumes:
      - ./ghproxy/log:/data/ghproxy/log
      - ./ghproxy/config:/data/ghproxy/config
    
    # 环境变量
    environment:
      - TZ=Asia/Shanghai
    
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 128M
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # 网络配置
    networks:
      - ghproxy-network

networks:
  ghproxy-network:
    driver: bridge
